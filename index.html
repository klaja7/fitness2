<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍺 Bakdag</title>
<style>
#bk{font-family:sans-serif;padding:16px;background:#1a1208;min-height:100vh;color:#f5e6c8;}
#bk h1{text-align:center;color:#e8a020;font-size:40px;margin:0 0 20px;}
#bk input{width:55%;padding:10px;font-size:15px;background:#241a0a;color:#f5e6c8;border:1px solid #e8a020;border-radius:4px;}
.abtn{padding:10px 14px;font-size:15px;background:#e8a020;color:#000;border:none;border-radius:4px;cursor:pointer;margin-left:6px;}
#bk ul{list-style:none;padding:0;margin:10px 0;}
#bk ul li{background:#241a0a;border:1px solid #3d2a08;padding:8px 12px;margin-bottom:6px;border-radius:4px;display:flex;justify-content:space-between;color:#f5e6c8;}
#bk ul li button{background:none;border:none;color:#e84040;font-size:18px;cursor:pointer;}
#startBtn{display:none;width:100%;padding:13px;font-size:19px;background:#e8a020;color:#000;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
#game{display:none;}
.game-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.game-top span{font-size:16px;color:#8a7355;}
.game-top span b{color:#e8a020;font-size:20px;}
.topbtns{display:flex;gap:8px;}
.resetbtn{padding:8px 14px;font-size:14px;background:transparent;color:#e84040;border:1px solid #e84040;border-radius:4px;cursor:pointer;}
.resetbtn.confirm-reset{background:#e84040;color:#fff;font-weight:bold;}
.addbtn2{padding:8px 14px;font-size:14px;background:transparent;color:#e8a020;border:1px solid #e8a020;border-radius:4px;cursor:pointer;}
#addForm{display:none;background:#241a0a;border:1px solid #e8a020;border-radius:8px;padding:12px;margin-bottom:14px;}
#addForm p{font-size:13px;color:#8a7355;margin:0 0 8px;}
#addForm .row2{display:flex;gap:8px;}
#addForm input{flex:1;padding:9px;font-size:15px;background:#1a1208;color:#f5e6c8;border:1px solid #3d2a08;border-radius:4px;}
#addForm input:focus{border-color:#e8a020;outline:none;}
#addForm .cbtn{padding:9px 14px;font-size:14px;background:#e8a020;color:#000;border:none;border-radius:4px;cursor:pointer;}
#addForm .xcbtn{padding:9px 14px;font-size:14px;background:transparent;color:#8a7355;border:1px solid #3d2a08;border-radius:4px;cursor:pointer;}
.card{background:#241a0a;border:2px solid #3d2a08;border-radius:8px;padding:14px;margin-bottom:12px;}
.card.done{border-color:#e8a020;}
.card h2{margin:0 0 6px;font-size:24px;color:#f5e6c8;}
.card .num{font-size:60px;color:#e8a020;line-height:1;}
.card .sub{color:#8a7355;margin-bottom:10px;font-size:14px;}
.card .pb{width:100%;padding:13px;font-size:16px;background:rgba(232,160,32,0.15);color:#e8a020;border:2px solid #e8a020;border-radius:6px;cursor:pointer;}
.card .pb.armed{background:#e8a020;color:#000;font-weight:bold;}
.card.done .pb{display:none;}
.card .bdg{display:none;text-align:center;padding:10px;border:1px solid #e8a020;border-radius:4px;color:#e8a020;font-size:18px;}
.card.done .bdg{display:block;}
#lb{background:#241a0a;border:1px solid #3d2a08;border-radius:8px;padding:14px;margin-top:8px;}
#lb h3{color:#8a7355;font-size:14px;letter-spacing:2px;text-transform:uppercase;margin:0 0 10px;}
.lrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #3d2a08;}
.lrow:last-child{border-bottom:none;}
.lpos{font-size:18px;width:28px;text-align:center;}
.lname{flex:1;font-size:16px;color:#f5e6c8;}
.lcount{font-size:20px;font-weight:bold;color:#e8a020;}
.lbar{height:4px;background:#3d2a08;border-radius:2px;margin-top:4px;}
.lbarfill{height:100%;background:#e8a020;border-radius:2px;transition:width 0.4s;}
</style>
</head>
<body>
<div id="bk">
<h1>🍺 Bakdag</h1>
<div id="setup">
  <div><input id="ni" type="text" placeholder="Naam speler…" maxlength="20"><button class="abtn" id="ab">+ Voeg toe</button></div>
  <ul id="pl"></ul>
  <button id="startBtn">🍺 Start Bakdag</button>
</div>
<div id="game">
  <div class="game-top">
    <span>Totaal: <b id="tn">0</b></span>
    <div class="topbtns">
      <button class="addbtn2" id="showAddBtn">+ Speler</button>
      <button class="resetbtn" id="resetBtn">↩ Reset</button>
    </div>
  </div>
  <div id="addForm">
    <p>Nieuwe speler toevoegen</p>
    <div class="row2">
      <input id="ni2" type="text" placeholder="Naam…" maxlength="20">
      <button class="cbtn" id="addMidBtn">+ Voeg toe</button>
      <button class="xcbtn" id="cancelAddBtn">✕</button>
    </div>
  </div>
  <div id="cards"></div>
  <div id="lb"><h3>🏆 Leaderboard</h3><div id="lbrows"></div></div>
</div>
</div>
<script>
var MAX=24,players=[],armed={},resetTimer=null;
document.getElementById('ab').addEventListener('click',addP);
document.getElementById('ni').addEventListener('keydown',function(e){if(e.key==='Enter')addP();});
document.getElementById('startBtn').addEventListener('click',startG);
document.getElementById('showAddBtn').addEventListener('click',function(){
  document.getElementById('addForm').style.display='block';
  document.getElementById('ni2').focus();
});
document.getElementById('cancelAddBtn').addEventListener('click',function(){
  document.getElementById('addForm').style.display='none';
  document.getElementById('ni2').value='';
});
document.getElementById('addMidBtn').addEventListener('click',addMid);
document.getElementById('ni2').addEventListener('keydown',function(e){if(e.key==='Enter')addMid();});
document.getElementById('resetBtn').addEventListener('click',function(){
  var btn=document.getElementById('resetBtn');
  if(resetTimer){
    clearTimeout(resetTimer);resetTimer=null;
    players.forEach(function(p){p.count=0;});
    armed={};
    btn.className='resetbtn';btn.textContent='↩ Reset';
    buildC();
  } else {
    btn.className='resetbtn confirm-reset';btn.textContent='⚠️ Zeker? Nogmaals!';
    resetTimer=setTimeout(function(){
      btn.className='resetbtn';btn.textContent='↩ Reset';
      resetTimer=null;
    },4000);
  }
});
function addP(){
  var inp=document.getElementById('ni'),name=inp.value.trim();
  if(!name)return;
  players.push({name:name,count:0});
  inp.value='';inp.focus();
  renderL();
}
function addMid(){
  var inp=document.getElementById('ni2'),name=inp.value.trim();
  if(!name)return;
  players.push({name:name,count:0});
  inp.value='';
  document.getElementById('addForm').style.display='none';
  addCard(players.length-1);
  upTot();upLB();
}
function renderL(){
  var ul=document.getElementById('pl');
  ul.innerHTML='';
  players.forEach(function(p,i){
    var li=document.createElement('li');
    li.textContent=p.name;
    var d=document.createElement('button');
    d.textContent='✕';
    d.addEventListener('click',(function(idx){return function(){players.splice(idx,1);renderL();};})(i));
    li.appendChild(d);ul.appendChild(li);
  });
  document.getElementById('startBtn').style.display=players.length>=2?'block':'none';
}
function startG(){
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  buildC();
}
function buildC(){
  document.getElementById('cards').innerHTML='';
  players.forEach(function(p,idx){addCard(idx);});
  upTot();upLB();
}
function addCard(idx){
  var p=players[idx];
  var card=document.createElement('div');
  card.className='card'+(p.count>=MAX?' done':'');
  card.id='card'+idx;
  var h=document.createElement('h2');h.textContent=p.name;
  var n=document.createElement('div');n.className='num';n.id='num'+idx;n.textContent=p.count;
  var s=document.createElement('div');s.className='sub';s.textContent='/ '+MAX+' pinten';
  var btn=document.createElement('button');btn.className='pb';btn.id='btn'+idx;
  btn.textContent='🍺 Pint bijschrijven';
  btn.addEventListener('click',(function(i){return function(){tap(i);};})(idx));
  var bdg=document.createElement('div');bdg.className='bdg';bdg.textContent='✔ GEDAAN!';
  card.appendChild(h);card.appendChild(n);card.appendChild(s);card.appendChild(btn);card.appendChild(bdg);
  document.getElementById('cards').appendChild(card);
}
function tap(idx){
  var p=players[idx];
  if(p.count>=MAX)return;
  var btn=document.getElementById('btn'+idx);
  if(armed[idx]){
    clearTimeout(armed[idx]);delete armed[idx];
    p.count++;
    document.getElementById('num'+idx).textContent=p.count;
    btn.className='pb';btn.textContent='🍺 Pint bijschrijven';
    if(p.count>=MAX)document.getElementById('card'+idx).className='card done';
    upTot();upLB();
  } else {
    btn.className='pb armed';btn.textContent='✅ Nogmaals tikken!';
    armed[idx]=setTimeout(function(){
      btn.className='pb';btn.textContent='🍺 Pint bijschrijven';
      delete armed[idx];
    },4000);
  }
}
function upTot(){
  var t=0;players.forEach(function(p){t+=p.count;});
  document.getElementById('tn').textContent=t;
}
function upLB(){
  var sorted=players.slice().sort(function(a,b){return b.count-a.count;});
  var top=sorted[0]?sorted[0].count:0;
  var html='';
  sorted.forEach(function(p,i){
    var icon=i===0&&top>0?'👑':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    var pct=top>0?Math.round(p.count/top*100):0;
    html+='<div class="lrow"><span class="lpos">'+icon+'</span><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center"><span class="lname">'+p.name+'</span><span class="lcount">'+p.count+'</span></div><div class="lbar"><div class="lbarfill" style="width:'+pct+'%"></div></div></div></div>';
  });
  document.getElementById('lbrows').innerHTML=html;
}
</script>
</body>
</html>
